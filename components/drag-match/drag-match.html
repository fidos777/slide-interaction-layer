<!-- P11 Drag-Match / Matching — pair items across two sets.
     completion: all_pairs_matched_correctly. Drag is an ENHANCEMENT; the keyboard path
     (select source, then select target) is fully supported and is the primary path.
     Static fallback: correct pairs listed if JS off. Theme via --sil-* vars. -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>P11 Drag-Match</title>
<style>
  :root{ --sil-ink:#EDEFF2; --sil-muted:#7C828C; --sil-accent:#C6F24E; --sil-panel:#0F1217; --sil-line:rgba(255,255,255,.12); --sil-bg:#0C0E12; --sil-ok:#4ade80; --sil-no:#f87171; }
  body{background:var(--sil-bg);color:var(--sil-ink);font-family:system-ui,sans-serif;padding:40px}
  .sil-dm{display:grid;grid-template-columns:1fr 1fr;gap:30px;max-width:820px}
  .sil-col h4{margin:0 0 12px;color:var(--sil-muted);font:600 14px monospace;text-transform:uppercase;letter-spacing:.1em}
  .sil-item{display:block;width:100%;text-align:left;background:var(--sil-panel);color:var(--sil-ink);
    border:1px solid var(--sil-line);border-radius:12px;padding:16px 18px;margin-bottom:12px;font:500 18px system-ui;cursor:pointer}
  .sil-item:focus-visible{outline:none;box-shadow:0 0 0 3px var(--sil-accent)}
  .sil-item[aria-grabbed="true"]{border-color:var(--sil-accent);background:rgba(198,242,78,.12)}
  .sil-item.is-matched{border-color:var(--sil-ok);background:rgba(74,222,128,.12);cursor:default;opacity:.7}
  .sil-item.is-wrong{border-color:var(--sil-no);animation:bounce .3s}
  @keyframes bounce{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .sil-status{grid-column:1/3;font:14px monospace;color:var(--sil-muted);min-height:22px}
  @media (prefers-reduced-motion:reduce){.sil-item.is-wrong{animation:none}}
</style></head><body>

<div class="sil-dm" data-sil="drag-match" data-completion="all_pairs_matched_correctly">
  <div class="sil-col">
    <h4>Term</h4>
    <button class="sil-item" data-role="src" data-key="a">Workflow</button>
    <button class="sil-item" data-role="src" data-key="b">Skill</button>
    <button class="sil-item" data-role="src" data-key="c">Gating</button>
  </div>
  <div class="sil-col">
    <h4>Definition</h4>
    <button class="sil-item" data-role="tgt" data-key="b">Frozen, reusable expertise</button>
    <button class="sil-item" data-role="tgt" data-key="c">Blocks next until complete</button>
    <button class="sil-item" data-role="tgt" data-key="a">A repeatable sequence of steps</button>
  </div>
  <p class="sil-status" data-sil-status aria-live="polite">Select a term, then its definition. 0 / 3 matched.</p>
</div>

<script>
(function(){
  var root=document.querySelector('[data-sil="drag-match"]');
  var status=root.querySelector('[data-sil-status]');
  var srcs=[].slice.call(root.querySelectorAll('[data-role="src"]'));
  var sel=null;
  function matched(){ return root.querySelectorAll('[data-role="src"].is-matched').length; }
  function announce(msg){ status.textContent=msg+' '+matched()+' / '+srcs.length+' matched.'; }
  function pick(el){
    if(el.classList.contains('is-matched')) return;
    if(sel) sel.setAttribute('aria-grabbed','false');
    sel=el; el.setAttribute('aria-grabbed','true'); announce('Now pick the match for "'+el.textContent+'".');
  }
  function tryMatch(tgt){
    if(!sel || tgt.classList.contains('is-matched')) return;
    if(tgt.dataset.key===sel.dataset.key){
      sel.classList.add('is-matched'); tgt.classList.add('is-matched');
      sel.setAttribute('aria-grabbed','false'); sel=null; announce('Matched.');
      if(matched()===srcs.length){ root.setAttribute('data-complete','true'); status.textContent='All matched correctly ✓'; }
    } else {
      tgt.classList.add('is-wrong'); setTimeout(function(){tgt.classList.remove('is-wrong');},300);
      announce('Not a match — try again.');
    }
  }
  root.addEventListener('click',function(e){
    var it=e.target.closest('.sil-item'); if(!it) return;
    if(it.dataset.role==='src') pick(it); else tryMatch(it);
  });
  // drag enhancement (optional; keyboard/click path above is primary)
  [].forEach.call(root.querySelectorAll('[data-role="src"]'),function(s){ s.draggable=true;
    s.addEventListener('dragstart',function(){pick(s);}); });
  [].forEach.call(root.querySelectorAll('[data-role="tgt"]'),function(t){
    t.addEventListener('dragover',function(e){e.preventDefault();});
    t.addEventListener('drop',function(e){e.preventDefault();tryMatch(t);}); });
})();
</script>
</body></html>
