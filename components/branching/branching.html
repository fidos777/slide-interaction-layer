<!-- P7 Branching Scenario — decide & see consequence. completion: reached_an_ending.
     Static fallback: linear summary of the recommended path. -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>P7 Branching</title>
<style>
  :root{ --sil-ink:#EDEFF2; --sil-muted:#7C828C; --sil-accent:#C6F24E; --sil-panel:#0F1217; --sil-line:rgba(255,255,255,.12); --sil-bg:#0C0E12; }
  body{background:var(--sil-bg);color:var(--sil-ink);font-family:system-ui,sans-serif;padding:40px}
  .sil-branch{max-width:660px}
  .sil-node{display:none}.sil-node.is-active{display:block;animation:fin .3s}
  @keyframes fin{from{opacity:0;transform:translateY(8px)}to{opacity:1}}
  .sil-node p{font-size:20px;line-height:1.5;margin:0 0 18px}
  .sil-choice{display:block;width:100%;text-align:left;background:var(--sil-panel);color:var(--sil-ink);
    border:1px solid var(--sil-line);border-radius:12px;padding:14px 18px;margin-bottom:10px;font:500 16px system-ui;cursor:pointer}
  .sil-choice:focus-visible{outline:none;box-shadow:0 0 0 3px var(--sil-accent)}
  .sil-end{color:var(--sil-accent);font-weight:600}
  .sil-restart{background:none;border:1px solid var(--sil-line);color:var(--sil-muted);border-radius:10px;
    padding:8px 14px;cursor:pointer;margin-top:8px;font:14px system-ui}
  @media (prefers-reduced-motion:reduce){.sil-node.is-active{animation:none}}
</style></head><body>

<div class="sil-branch" data-sil="branching" data-completion="reached_an_ending">
  <div class="sil-node is-active" data-node="start">
    <p>A customer is angry about a late delivery. What do you do first?</p>
    <button class="sil-choice" data-go="empathy">Acknowledge and apologize</button>
    <button class="sil-choice" data-go="defend">Explain it wasn't your fault</button>
  </div>
  <div class="sil-node" data-node="empathy">
    <p class="sil-end">Good. They feel heard. Now offer a concrete fix and a timeline.</p>
    <button class="sil-restart" data-restart>Replay</button>
  </div>
  <div class="sil-node" data-node="defend">
    <p>They get angrier. Recover by acknowledging their frustration first.</p>
    <button class="sil-choice" data-go="empathy">Apologize and reset</button>
  </div>
</div>

<script>
(function(){
  var root=document.querySelector('[data-sil="branching"]');
  function show(id){ root.querySelectorAll('.sil-node').forEach(function(n){
    n.classList.toggle('is-active',n.dataset.node===id); });
    if(root.querySelector('.sil-node.is-active .sil-end')) root.setAttribute('data-complete','true'); }
  root.addEventListener('click',function(e){
    var go=e.target.closest('[data-go]'); if(go) show(go.dataset.go);
    if(e.target.closest('[data-restart]')) show('start');
  });
})();
</script>
</body></html>
